name: Deploy API (Production)

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy-api:
    name: Deploy Cloudflare Workers Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        working-directory: ./apps/api
        run: |
          npx wrangler deploy --env production \
            --var CLERK_SECRET_KEY:${{ secrets.CLERK_SECRET_KEY }} \
            --var CLERK_JWKS_URL:${{ secrets.CLERK_JWKS_URL }} \
            --var CLERK_WEBHOOK_SECRET:${{ secrets.CLERK_WEBHOOK_SECRET }} \
            --var NEXT_PUBLIC_APP_URL:${{ secrets.NEXT_PUBLIC_APP_URL }} \
            --var NEXT_PUBLIC_API_URL:${{ secrets.NEXT_PUBLIC_API_URL }} \
            --var CF_D1_DATABASE_NAME:filevault-db \
            --var CF_R2_BUCKET_NAME:filevault-files

  deploy-api-preview:
    name: Deploy Cloudflare Workers Preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers Preview
        working-directory: ./apps/api
        run: |
          npx wrangler deploy --env preview \
            --var CLERK_SECRET_KEY:${{ secrets.CLERK_SECRET_KEY }} \
            --var CLERK_JWKS_URL:${{ secrets.CLERK_JWKS_URL }} \
            --var CLERK_WEBHOOK_SECRET:${{ secrets.CLERK_WEBHOOK_SECRET }} \
            --var NEXT_PUBLIC_APP_URL:${{ secrets.NEXT_PUBLIC_APP_URL }} \
            --var NEXT_PUBLIC_API_URL:${{ secrets.NEXT_PUBLIC_API_URL }} \
            --var CF_D1_DATABASE_NAME:filevault-db \
            --var CF_R2_BUCKET_NAME:filevault-files
