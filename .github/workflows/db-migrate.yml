name: Database Migrations

on:
  push:
    paths:
      - 'packages/db-d1/migrations/**'
  workflow_dispatch:

env:
  CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

jobs:
  migrate:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 Migrations (Production)
        run: |
          echo "Applying migrations to D1 database..."
          for file in packages/db-d1/migrations/*.sql; do
            echo "Applying $file..."
            npx wrangler d1 execute filevault-db --remote --file="$file"
          done
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  migrate-preview:
    name: Run D1 Migrations (Preview)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply D1 Migrations (Preview)
        run: |
          echo "Applying migrations to D1 preview database..."
          for file in packages/db-d1/migrations/*.sql; do
            echo "Applying $file..."
            npx wrangler d1 execute filevault-db --local --file="$file"
          done
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
