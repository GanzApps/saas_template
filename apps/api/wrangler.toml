name = "filevault-api"
main = "src/index.ts"
compatibility_date = "2024-06-17"
compatibility_flags = ["nodejs_compat"]
account_id = "a76e974e7c97043eb60c5a97bb651284"

[vars]
NODE_ENV = "production"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "filevault-db"
database_id = "2b79c7d0-b19b-488f-adb2-133f63abb328"
migrations_dir = "../../packages/db-d1/migrations"

# R2 Bucket binding
[[r2_buckets]]
binding = "FILEVAULT_BUCKET"
bucket_name = "filevault-files"

# Secrets set via: wrangler secret put <NAME>
# CLERK_SECRET_KEY
# CLERK_JWKS_URL
# CLERK_WEBHOOK_SECRET
# NEXT_PUBLIC_APP_URL (non-secret but env-specific)
# NEXT_PUBLIC_API_URL (non-secret but env-specific)
# NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
# CF_R2_PUBLIC_URL  (optional — public R2 domain)
