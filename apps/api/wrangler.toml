name = "reviewflow-api"
main = "src/index.ts"
compatibility_date = "2024-06-17"
compatibility_flags = ["nodejs_compat"]
account_id = "a76e974e7c97043eb60c5a97bb651284"

[vars]
NODE_ENV = "production"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "reviewflow-db"
database_id = "your-database-id-here"

# R2 Bucket binding for file storage
[[r2_buckets]]
binding = "REVIEWFLOW_BUCKET"
bucket_name = "reviewflow-assets"

# Secrets set via: wrangler secret put <NAME>
# CLERK_SECRET_KEY
# CLERK_JWKS_URL
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# GOOGLE_REDIRECT_URI
# ENCRYPTION_KEY
# TWILIO_ACCOUNT_SID
# TWILIO_AUTH_TOKEN
# TWILIO_WEBHOOK_SECRET
# TWILIO_PHONE_NUMBER
# RESEND_API_KEY
# RESEND_WEBHOOK_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# CLERK_WEBHOOK_SECRET